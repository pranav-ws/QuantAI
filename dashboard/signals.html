<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script>(function(){try{if(localStorage.getItem('qai_theme')==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>
<title>Signals — QuantAI</title>
<link rel="stylesheet" href="assets/theme.css"/>
</head>
<body data-page="signals">

<div id="shell-header"></div>
<div id="shell-app">
<main>

  <div class="page-head">
    <div>
      <div class="page-title">Signals</div>
      <div class="page-sub">Ensemble ML scan across all 50 Nifty stocks · click a row for the full chart</div>
    </div>
    <button class="btn btn-primary" id="btn-refresh">⟳ Re-scan</button>
  </div>

  <div class="card">
    <div class="card-body">
      <div class="filters">
        <input class="field" id="search" placeholder="🔍 Search ticker or name…" style="flex:1;min-width:200px" oninput="applyFilters()"/>
        <select class="field" id="f-sector" onchange="applyFilters()"><option value="">All sectors</option></select>
        <select class="field" id="f-signal" onchange="applyFilters()">
          <option value="">All signals</option>
          <option value="BUY">BUY only</option>
          <option value="SKIP">SKIP only</option>
        </select>
        <select class="field" id="f-regime" onchange="applyFilters()">
          <option value="">All regimes</option>
          <option value="BULL">🟢 BULL</option>
          <option value="SIDEWAYS">🟡 SIDEWAYS</option>
          <option value="BEAR">🔴 BEAR</option>
        </select>
        <select class="field" id="f-watch" onchange="applyFilters()">
          <option value="">All stocks</option>
          <option value="1">Watchlist only</option>
        </select>
      </div>
      <div class="table-wrap">
        <table id="tbl">
          <thead>
            <tr>
              <th class="sortable" data-k="ticker">Ticker<span class="arrow"></span></th>
              <th class="sortable" data-k="name">Name<span class="arrow"></span></th>
              <th class="sortable" data-k="sector">Sector<span class="arrow"></span></th>
              <th class="sortable" data-k="price">Price<span class="arrow"></span></th>
              <th class="sortable" data-k="signal">Signal<span class="arrow"></span></th>
              <th class="sortable" data-k="confidence">Confidence<span class="arrow"></span></th>
              <th class="sortable" data-k="rsi">RSI<span class="arrow"></span></th>
              <th class="sortable" data-k="regime">Regime<span class="arrow"></span></th>
              <th>Model</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="10"><div class="loading-row"><div class="spinner"></div>Scanning 50 stocks…</div></td></tr>
          </tbody>
        </table>
      </div>
      <div class="muted" id="row-count" style="font-size:12px;margin-top:10px"></div>
    </div>
  </div>

</main>
</div>

<script src="assets/api.js"></script>
<script src="assets/shell.js"></script>
<script>
let SIGNALS = [];
let FILTERED = [];
let WATCHLIST = new Set();
let sortKey = "confidence";
let sortDir = -1;

async function loadWatchlistSet(){
  if(!QuantAPI.getToken()){ WATCHLIST = new Set(); return; }
  try{ const d = await QuantAPI.watchlist(); WATCHLIST = new Set((d.watchlist||[]).map(x=>x.ticker)); }
  catch{ WATCHLIST = new Set(); }
}

async function toggleWatch(ticker, btn){
  if(!QuantAPI.getToken()){ toast("Sign in to use your watchlist.", "err"); return; }
  const saved = WATCHLIST.has(ticker);
  try{
    if(saved){ await QuantAPI.removeWatch(ticker); WATCHLIST.delete(ticker); }
    else{ await QuantAPI.addWatch(ticker); WATCHLIST.add(ticker); }
    btn.classList.toggle("wl-on", !saved);
    btn.textContent = saved ? "☆" : "★";
  }catch(e){ toast(e.message, "err"); }
}

function populateSectorFilter(){
  const sectors = [...new Set(SIGNALS.map(s=>s.sector).filter(Boolean))].sort();
  const sel = document.getElementById("f-sector");
  sel.innerHTML = '<option value="">All sectors</option>' + sectors.map(s=>`<option value="${s}">${s}</option>`).join("");
}

function applyFilters(){
  const q     = document.getElementById("search").value.toLowerCase();
  const sec   = document.getElementById("f-sector").value;
  const sig   = document.getElementById("f-signal").value;
  const reg   = document.getElementById("f-regime").value;
  const wOnly = document.getElementById("f-watch").value === "1";
  FILTERED = SIGNALS.filter(s=>{
    const mQ = !q   || s.ticker.toLowerCase().includes(q) || (s.name||"").toLowerCase().includes(q);
    const mS = !sec || s.sector === sec;
    const mG = !sig || s.signal === sig;
    const mR = !reg || s.regime === reg;
    const mW = !wOnly || WATCHLIST.has(s.ticker);
    return mQ && mS && mG && mR && mW;
  });
  sortRows();
}

function sortRows(){
  FILTERED.sort((a,b)=>{
    let va = a[sortKey], vb = b[sortKey];
    if(typeof va === "string") return sortDir * va.localeCompare(vb||"");
    return sortDir * ((va||0) - (vb||0));
  });
  renderTable();
}

function renderTable(){
  const tbody = document.getElementById("tbody");
  if(!FILTERED.length){
    tbody.innerHTML = `<tr><td colspan="10"><div class="empty-state"><div class="ic">🔍</div>No stocks match these filters.</div></td></tr>`;
  }else{
    tbody.innerHTML = FILTERED.map(s=>{
      const isBuy   = s.signal === "BUY";
      const conf    = Math.round((s.confidence||0)*100);
      const rsi     = s.rsi||0;
      const rsiColor = rsi>70 ? "var(--red)" : rsi<30 ? "var(--green)" : "var(--text)";
      const saved   = WATCHLIST.has(s.ticker);
      const regCls  = s.regime==="BULL"?"regime-bull":s.regime==="BEAR"?"regime-bear":"regime-side";
      const regIcon = s.regime==="BULL"?"🟢":s.regime==="BEAR"?"🔴":"🟡";
      const thrNote = s.threshold ? ` <span class="muted" style="font-size:10px">/${Math.round(s.threshold*100)}%</span>` : "";
      return `<tr onclick="location.href='stock.html?ticker=${tickerShort(s.ticker)}'">
        <td><strong>${tickerShort(s.ticker)}</strong></td>
        <td class="muted">${(s.name||"").slice(0,22)}</td>
        <td class="muted" style="font-size:12px">${s.sector||""}</td>
        <td class="num">₹${fmtNum(s.price)}</td>
        <td><span class="badge ${isBuy?"badge-buy":"badge-skip"}">${isBuy?"● BUY":"○ SKIP"}</span></td>
        <td><div class="conf-bar-wrap"><span class="num">${conf}%${thrNote}</span><div class="conf-bar"><div class="conf-fill" style="width:${conf}%"></div></div></div></td>
        <td class="num" style="color:${rsiColor}">${rsi.toFixed(1)}</td>
        <td><span class="${regCls}" style="font-size:12px;font-weight:600">${regIcon} ${s.regime||"—"}</span></td>
        <td class="muted" style="font-size:11px">${s.model_type||""}</td>
        <td><button class="btn ${saved?'btn-primary':''}" style="padding:4px 10px" onclick="event.stopPropagation();toggleWatch('${s.ticker}',this)">${saved?"★":"☆"}</button></td>
      </tr>`;
    }).join("");
  }
  document.getElementById("row-count").textContent = `${FILTERED.length} of ${SIGNALS.length} stocks`;
  document.querySelectorAll("th.sortable .arrow").forEach(a=>a.textContent="");
  const active = document.querySelector(`th[data-k="${sortKey}"] .arrow`);
  if(active) active.textContent = sortDir===1 ? "▲" : "▼";
}

document.querySelectorAll("th.sortable").forEach(th=>{
  th.onclick = () => {
    const k = th.dataset.k;
    if(sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = 1; }
    sortRows();
  };
});

async function load(force=false){
  try{
    const data = await SignalsCache.get(force);
    SIGNALS = data.results || [];
    await loadWatchlistSet();
    populateSectorFilter();
    renderTape(SIGNALS);
    refreshCmdkTickers(SIGNALS);
    applyFilters();
  }catch(e){
    document.getElementById("tbody").innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="ic">⚠️</div>${e.message}</div></td></tr>`;
    toast(e.message, "err");
  }
}

document.getElementById("btn-refresh").onclick = () => load(true);
load();
</script>
</body>
</html>
