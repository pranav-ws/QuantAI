services:
  - type: web
    name: quantai-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: QUANTAI_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
    disk:
      name: quantai-data
      # /app/data was wrong: that's the Docker WORKDIR convention, but this
      # is a native Python runtime, where Render's own docs confirm source
      # code (and therefore this app's file-relative data/ path) lives at
      # /opt/render/project/src — so the disk has to be mounted there to
      # actually be under the same path the app reads/writes from.
      mountPath: /opt/render/project/src/data
      sizeGB: 1
